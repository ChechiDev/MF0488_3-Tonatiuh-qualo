name: Build README

on:
  push:
    branches: [main]
    paths:
      - 'assets/docs/**'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build README
        run: python build.py

      - name: Commit y push README actualizado
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update README [skip ci]"
          git push
